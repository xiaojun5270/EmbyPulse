name: EmbyPulseiOS
options:
  minimumXcodeGenVersion: 2.37.0
  xcodeVersion: "15.4"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
targets:
  EmbyPulseiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - EmbyPulseiOS
    info:
      path: EmbyPulseiOS/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.embypulse.ios
        PRODUCT_NAME: EmbyPulseiOS
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
schemes:
  EmbyPulseiOS:
    build:
      targets:
        EmbyPulseiOS: all
    run:
      config: Debug
